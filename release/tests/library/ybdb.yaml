# The resources in this file describe the system/environment under test and should not change the test being run.
# This file defines the environment use to verify releases on a deployment of two DSSs pooled in two different clouds.

# ===== NetRID =====

netrid_dss_instances_v19:
  $content_schema: monitoring/uss_qualifier/resources/definitions/ResourceDeclaration.json
  resource_type: resources.astm.f3411.DSSInstancesResource
  dependencies:
    auth_adapter: utm_auth
  specification:
    dss_instances:
      - participant_id: uss1
        rid_version: F3411-19
        base_url: https://dss.release-ybdb.ci.google-interuss.uspace.dev
      - participant_id: uss2
        rid_version: F3411-19
        base_url: https://dss.release-ybdb.ci.aws-interuss.uspace.dev

netrid_dss_instances_v22a:
  $content_schema: monitoring/uss_qualifier/resources/definitions/ResourceDeclaration.json
  resource_type: resources.astm.f3411.DSSInstancesResource
  dependencies:
    auth_adapter: utm_auth
  specification:
    dss_instances:
      - participant_id: uss1
        rid_version: F3411-22a
        base_url: https://dss.release-ybdb.ci.google-interuss.uspace.dev/rid/v2
      - participant_id: uss2
        rid_version: F3411-22a
        base_url: https://dss.release-ybdb.ci.aws-interuss.uspace.dev/rid/v2

# ===== F3548 =====

scd_dss:
